    <div class="stats-grid">
      @for (card of statCards(); track card.label) {
        <div class="stat-card">
          <div class="stat-icon" [ngClass]="card.bgClass">
            <i class="las {{ card.icon }}"></i>
          </div>
          <div class="stat-details">
            <div class="stat-label">{{ card.label }}</div>
            <h2>{{ card.value }}</h2>
          </div>
        </div>
      }
    </div>

    <div class="dashboard-grid">

      <div class="card">
        <div class="card-header">
          <h3><i class="las la-code-branch"></i> Projetos Recentes</h3>
          <a href="#" class="see-link">See all →</a>
        </div>
        <div class="table-responsive">
          <table class="projects-table">
            <thead>
              <tr>
                <th>Project Title</th>
                <th>Department</th>
                <th>Status</th>
              </tr>
            </thead>
          </table>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h3><i class="las la-user-plus"></i> New customer</h3>
          <a href="#" class="see-link">Ver todos →</a>
        </div>

      </div>

    </div>
